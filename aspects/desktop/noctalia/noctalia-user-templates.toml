[theme.templates.user.emacs-noctalia]
input_path = "~/.config/noctalia/emacs-template.el"
output_path = "~/.local/share/noctalia/emacs-themes/noctalia-theme.el"
post_hook = 'noctalia-theme-reload'

[theme.templates.user.nvim-base16]
input_path = "~/.config/nvim/lua/matugen-template.lua"
output_path = "~/.config/nvim/lua/matugen.lua"
post_hook = 'pkill -SIGUSR1 nvim'

[theme.templates.user.wezterm-colors]
input_path = "~/.config/noctalia/wezterm-colors-template.lua"
output_path = "~/.local/share/noctalia/wezterm-colors.lua"
# WezTerm watches the generated colors file directly from wezterm.lua.
